name: Build App

# Trigger workflow on pushes or PRs to main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Optional: Setup Node.js if your app uses it
      - name: Setup Node.js (Optional)
        if: exists('package.json')       # Only run if package.json exists
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # 3️⃣ Install dependencies if Node is used
      - name: Install Dependencies (Optional)
        if: exists('package.json')
        run: |
          # Generate lock file if missing
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json found, generating..."
            npm install
          else
            npm ci
          fi

      # 4️⃣ Build app
      - name: Build App
        run: |
          if [ -f package.json ]; then
            npm run build || echo "No build script, skipping..."
          else
            echo "No package.json, assuming plain HTML/JS/CSS, skipping Node build."
          fi

      # 5️⃣ Optional: Run tests
      - name: Run Tests
        run: |
          if [ -f package.json ]; then
            npm test || echo "No test script, skipping..."
          else
            echo "No tests configured."
          fi

      # 6️⃣ Optional: Upload build artifacts (e.g., for release or further steps)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: ./build         # change this to your actual build folder
